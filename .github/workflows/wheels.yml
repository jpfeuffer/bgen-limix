name: Build wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cibw-sdist
          path: dist/*.tar.gz


  build_wheels:
    name: Wheels on ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: ubuntu-24.04-x86_64
            cibw_archs_linux: x86_64
          - os: ubuntu-24.04
            label: ubuntu-24.04-aarch64
            cibw_archs_linux: aarch64
          - os: macos-15
            label: macos-15
          - os: windows-2025
            label: windows-2025

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up QEMU (for aarch64 Linux builds)
        if: matrix.cibw_archs_linux == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          # Build for CPython 3.11 only — stable ABI (abi3) wheel works for all 3.11+
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-musllinux_i686"
          # Test the built wheels
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/python/tests -v
          # macOS: build universal2 wheels on the ARM runner
          CIBW_ARCHS_MACOS: "native"
          # Linux: each matrix entry targets one architecture
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          # Windows: build AMD64 only
          CIBW_ARCHS_WINDOWS: "AMD64"
          # Install OpenSSL headers needed by fetched curl on Linux
          CIBW_BEFORE_BUILD_LINUX: >
            (command -v yum && yum install -y openssl-devel) ||
            (command -v apk && apk add openssl-dev) || true

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cibw-wheels-${{ matrix.label }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/cbgen
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@v1.14.0
