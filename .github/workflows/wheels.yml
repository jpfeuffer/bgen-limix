name: Build wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cibw-sdist
          path: dist/*.tar.gz


  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          # Build for CPython 3.11–3.14
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_i686"
          # Test the built wheels
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/python/tests -v
          # macOS: build universal2 wheels on the ARM runner
          CIBW_ARCHS_MACOS: "native"
          # Linux: build x86_64 and aarch64
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          # Windows: build AMD64 only
          CIBW_ARCHS_WINDOWS: "AMD64"
          # Install OpenSSL headers needed by fetched curl on Linux
          CIBW_BEFORE_BUILD_LINUX: >
            (command -v yum && yum install -y openssl-devel) ||
            (command -v apk && apk add openssl-dev) || true

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/cbgen
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@v1.14.0
